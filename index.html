<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.module.js';
import { VRButton } from 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/webxr/VRButton.js';

const scene = new THREE.Scene();

// カメラ
const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  1,
  1000
);

// 👇 視点の高さ（ここ重要）
camera.position.set(0, 170, 0);

// レンダラー
const renderer = new THREE.WebGLRenderer();
renderer.xr.enabled = true;

// 👇 床基準（超重要）
renderer.xr.setReferenceSpaceType('local-floor');

renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);
document.body.appendChild(VRButton.createButton(renderer));

// 球体
const geometry = new THREE.SphereGeometry(500, 60, 40);
geometry.scale(-1, 1, 1);

// 画像
const texture = new THREE.TextureLoader().load('room.png');
const material = new THREE.MeshBasicMaterial({ map: texture });
const mesh = new THREE.Mesh(geometry, material);
scene.add(mesh);

// 操作
let lon = 0;
let lat = 0;
let isDragging = false;

document.addEventListener('mousedown', () => isDragging = true);
document.addEventListener('mouseup', () => isDragging = false);

document.addEventListener('mousemove', (event) => {
  if (isDragging) {
    lon -= event.movementX * 0.05;
    lat += event.movementY * 0.05;
  }
});

// 描画
function animate() {
  lat = Math.max(-85, Math.min(85, lat));

  const phi = THREE.MathUtils.degToRad(90 - lat);
  const theta = THREE.MathUtils.degToRad(lon);

  camera.lookAt(
    500 * Math.sin(phi) * Math.cos(theta),
    500 * Math.cos(phi),
    500 * Math.sin(phi) * Math.sin(theta)
  );

  renderer.render(scene, camera);
}

renderer.setAnimationLoop(animate);
</script>
