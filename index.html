<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>360 Viewer</title>
  <style>
    body { margin: 0; overflow: hidden; }
  </style>
</head>
<body>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.module.js';
import { VRButton } from 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/webxr/VRButton.js';

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  50,
  window.innerWidth / window.innerHeight,
  1,
  2000
);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;
renderer.xr.setReferenceSpaceType('local-floor');

document.body.appendChild(renderer.domElement);
document.body.appendChild(VRButton.createButton(renderer));

// 360背景
const geometry = new THREE.SphereGeometry(1000, 64, 48);
geometry.scale(-1, 1, 1);

// 画像
const texture = new THREE.TextureLoader().load('room.png');
const material = new THREE.MeshBasicMaterial({ map: texture });
const mesh = new THREE.Mesh(geometry, material);
scene.add(mesh);

// 少しだけ立ち位置感を調整
scene.position.y = -170;

// PC用のドラッグ操作
let lon = 0;
let lat = 0;
let isDragging = false;

document.addEventListener('mousedown', () => isDragging = true);
document.addEventListener('mouseup', () => isDragging = false);

document.addEventListener('mousemove', (event) => {
  if (isDragging) {
    lon -= event.movementX * 0.05;
    lat += event.movementY * 0.05;
  }
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// 描画
function animate() {
  lat = Math.max(-85, Math.min(85, lat));

  const phi = THREE.MathUtils.degToRad(90 - lat);
  const theta = THREE.MathUtils.degToRad(lon);

  camera.lookAt(
    500 * Math.sin(phi) * Math.cos(theta),
    500 * Math.cos(phi),
    500 * Math.sin(phi) * Math.sin(theta)
  );

  renderer.render(scene, camera);
}

renderer.setAnimationLoop(animate);
</script>

</body>
</html>
