<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>360 Viewer</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.module.js';
import { VRButton } from 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/webxr/VRButton.js';

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  35,
  window.innerWidth / window.innerHeight,
  0.1,
  5000
);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;
renderer.xr.setReferenceSpaceType('local-floor');

document.body.appendChild(renderer.domElement);
document.body.appendChild(VRButton.createButton(renderer));

// 360背景用の球体
const geometry = new THREE.SphereGeometry(1500, 96, 64);
geometry.scale(-1, 1, 1);

const texture = new THREE.TextureLoader().load('room.png');
const material = new THREE.MeshBasicMaterial({ map: texture });
const mesh = new THREE.Mesh(geometry, material);
scene.add(mesh);

// 目線の高さを少しだけ下げて、部屋の中にいる感じを調整
scene.position.y = -170;

// PC用のドラッグ操作
let lon = 0;
let lat = 0;
let isDragging = false;

document.addEventListener('mousedown', () => isDragging = true);
document.addEventListener('mouseup', () => isDragging = false);

document.addEventListener('mousemove', (event) => {
  if (isDragging) {
    lon -= event.movementX * 0.04;
    lat += event.movementY * 0.04;
  }
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

function animate() {
  lat = Math.max(-85, Math.min(85, lat));

  const phi = THREE.MathUtils.degToRad(90 - lat);
  const theta = THREE.MathUtils.degToRad(lon);

  camera.lookAt(
    500 * Math.sin(phi) * Math.cos(theta),
    500 * Math.cos(phi),
    500 * Math.sin(phi) * Math.sin(theta)
  );

  renderer.render(scene, camera);
}

renderer.setAnimationLoop(animate);
</script>
</body>
</html>
